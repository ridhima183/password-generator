<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Password Generator</h1>

      <div class="password-box">
        <input type="text" id="password" placeholder="Generated password" readonly />
        <button id="copyBtn">Copy</button>
      </div>

      <div class="controls">
        <div class="control">
          <label for="length">Password Length: <span id="lengthValue">12</span></label>
          <input type="range" id="length" min="4" max="32" value="12" />
        </div>

        <label class="check">
          <input type="checkbox" id="uppercase" checked />
          Include Uppercase
        </label>

        <label class="check">
          <input type="checkbox" id="numbers" checked />
          Include Numbers
        </label>

        <label class="check">
          <input type="checkbox" id="symbols" checked />
          Include Symbols
        </label>

        <button id="generateBtn" class="generate">Generate Password</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
